draft_market_scan_task:
  description: >
    Build an evidence-first draft market research brief for the following inputs:
    - company_name: {company_name}
    - website_url: {website_url}
    - industry: {industry}
    - country_focus: {country_focus}
    - research_goal: {research_goal}

    Mandatory workflow:
    1. Inspect the official website first when website_url is provided.
    2. Use public web search to validate category, competitor, and channel signals.
    3. Do not invent market size, revenue, ad spend, customer count, pricing, or share.
    4. Treat website marketing copy as a claim until supported by evidence.
    5. Separate evidence from assumptions.
    6. Since there is no CRM or prior internal knowledge, mark internal business facts as unknown unless verified.
    7. Use absolute dates for any time-sensitive statement.
    8. If evidence is weak or conflicting, lower confidence and set needs_human_review to true.

    Required output rules:
    - company_overview must be concise and evidence-based.
    - competitor_candidates must only include competitors with a reason_in_scope and evidence_summary.
    - assumptions must always be labeled with [ASSUMPTION].
    - missing_data must explicitly list the research gaps caused by limited public signals.
    - confidence must be one of: high, medium, low.
    - needs_human_review must be a boolean.

    Required output sections:
    - company_overview
    - products_services
    - target_audiences
    - markets_detected
    - positioning_signals
    - competitor_candidates
    - channel_opportunities
    - evidence
    - assumptions
    - missing_data
    - confidence
    - needs_human_review

  expected_output: >
    A valid MarketResearchReport Pydantic object with no invented metrics and clearly labeled assumptions.
  agent: market_research_analyst

verify_market_scan_task:
  description: >
    Review the draft market research report that appears in your context from the previous task.
    Your job is to audit it and return a corrected final report.

    Verification checklist:
    1. Remove or correct any unsupported factual claim.
    2. Remove or downgrade any competitor candidate that lacks evidence.
    3. Ensure every assumption is labeled with [ASSUMPTION].
    4. Ensure missing_data clearly reflects the absence of CRM, first-party analytics,
       ad account history, or internal business records when relevant.
    5. Ensure confidence is aligned with the quality, freshness, and consistency of evidence.
    6. Set needs_human_review to true when material uncertainty remains.
    7. Produce the final corrected report, not just critique notes.

    Additional verification fields required:
    - qa_passed
    - verification_summary
    - verification_issues
    - verifier_recommendations

    verification_issues rules:
    - each issue must include severity, field_name, issue, and recommendation
    - severity must be one of: low, medium, high

    Final-output rules:
    - preserve the original report structure
    - improve the report where necessary
    - do not invent facts during correction
    - if you cannot verify a point, downgrade it or move it to assumptions/missing_data

  expected_output: >
    A valid VerifiedMarketResearchReport Pydantic object representing the corrected final report plus verification metadata.
  agent: research_verifier
